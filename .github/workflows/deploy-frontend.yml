name: deploy-frontend

on:
  workflow_dispatch:
    inputs:
      frontend_tag:
        description: "Image tag to deploy (sha-xxxx, latest). Leave empty to deploy current commit SHA."
        required: false
        default: ""

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy frontend to homelab
    runs-on: [self-hosted, homelab, deploy]
    environment: production

    steps:
      - name: Checkout repo (for context only)
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide tag to deploy
        id: tag
        run: |
          if [ -n "${{ inputs.frontend_tag }}" ]; then
            echo "value=${{ inputs.frontend_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Show deployment plan
        run: |
          echo "Requested tag input: '${{ inputs.frontend_tag }}'"
          echo "Resolved tag to deploy: '${{ steps.tag.outputs.value }}'"
          echo "Target image: ghcr.io/${{ github.repository_owner }}/homelab-frontend:${{ steps.tag.outputs.value }}"

      - name: Deploy frontend
        env:
          FRONTEND_TAG: ${{ steps.tag.outputs.value }}
        run: |
          cd "${{ vars.REPO_ROOT || '/data/repos/homelab-stack' }}/app"
          ./deploy-frontend.sh
