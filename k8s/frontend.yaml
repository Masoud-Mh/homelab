# Frontend: nginx serving the prebuilt React/Vite image. Mirrors app/docker-compose.yml
# `frontend` after the P2 cutover (GHCR image, port 80, GET / health).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: homelab
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: homelab-stack
spec:
  replicas: 1 # static content — trivially scalable (principle 2)
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: frontend
          image: ghcr.io/masoud-mh/homelab-frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: homelab
  labels:
    app.kubernetes.io/name: frontend
spec:
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
