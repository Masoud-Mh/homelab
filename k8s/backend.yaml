# Backend: FastAPI service. Mirrors app/docker-compose.yml `backend` (GHCR image,
# CORS_ORIGINS from env, /healthz health endpoint, port 8000).
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: homelab
data:
  # Same comma-separated origins as app/.env (CORS_ORIGINS). Non-secret.
  CORS_ORIGINS: "http://site.local,https://masoud-mh.com,https://www.masoud-mh.com"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: homelab
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: homelab-stack
spec:
  replicas: 1 # stateless — safe to scale up (principle 2)
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      # GHCR images are private; create this pull secret in-cluster before deploy
      # (see k8s/README.md). The backend already pulls from GHCR in compose.
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: backend
          # Pin to a sha-<sha> tag in real deploys; latest here for the draft.
          image: ghcr.io/masoud-mh/homelab-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
          # Probes use the same health semantics as the Docker HEALTHCHECK.
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: homelab
  labels:
    app.kubernetes.io/name: backend
spec:
  selector:
    app.kubernetes.io/name: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
